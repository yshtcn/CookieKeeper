<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cookie Keeper — 配置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <div class="page">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="page-header">
      <div class="brand">
        <span class="brand-icon">🍪</span>
        <div>
          <h1>Cookie Keeper</h1>
          <p class="brand-sub">自动刷新并导出网站 Cookie</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" id="runAllBtn">▶ 全部运行</button>
        <button class="btn btn-ghost" id="exportAllBtn">⬇ 导出全部</button>
      </div>
    </header>

    <main class="page-main">

      <!-- ── Global Settings ──────────────────────────────────── -->
      <section class="card" id="settingsCard">
        <div class="card-title">
          <span>⚙</span> 全局设置
        </div>
        <div class="setting-row">
          <div class="setting-label-col">
            <span class="setting-name">保存子目录</span>
            <span class="setting-desc">
              Cookie 文件的保存位置，相对于系统<strong>下载目录</strong>。<br>
              ⚠ Chrome 扩展受安全限制，只能写入下载目录内的路径。
            </span>
          </div>
          <div class="setting-control-col">
            <div class="dir-input-row">
              <span class="dir-prefix">下载目录 /</span>
              <input type="text" class="form-input" id="inputBaseDir"
                     value="CookieKeeper" placeholder="CookieKeeper">
              <button class="btn btn-primary" id="saveDirBtn">保存</button>
            </div>
            <div class="path-preview" id="pathPreview">
              示例：下载目录 / CookieKeeper / youtube_com_cookies.txt
            </div>
          </div>
        </div>
      </section>

      <!-- ── Task List ─────────────────────────────────────────── -->
      <section class="card">
        <div class="card-header">
          <div class="card-title"><span>📋</span> 网站任务</div>
          <button class="btn btn-primary" id="addTaskBtn">＋ 添加网站</button>
        </div>

        <div id="taskList" class="task-list"></div>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon">🍪</div>
          <div class="empty-title">还没有配置任何网站</div>
          <div class="empty-sub">点击右上方「添加网站」开始配置</div>
        </div>
      </section>

    </main>
  </div>

  <!-- ── Add / Edit Modal ───────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">添加网站</div>

      <div class="form-group">
        <label class="form-label">网站地址 <span class="req">*</span></label>
        <input type="url" class="form-input" id="inputUrl"
               placeholder="https://www.youtube.com">
        <div class="form-error" id="urlError"></div>
      </div>

      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label class="form-label">刷新间隔 <span class="req">*</span></label>
          <div class="interval-row">
            <input type="number" class="form-input" id="inputInterval"
                   min="1" max="99999" value="1">
            <select class="form-select" id="inputUnit">
              <option value="1">分钟</option>
              <option value="60" selected>小时</option>
              <option value="1440">天</option>
            </select>
          </div>
          <div class="form-tip">最短 1 分钟（Chrome 限制）</div>
        </div>

        <div class="form-group" style="flex:1">
          <label class="form-label">备注名称（可选）</label>
          <input type="text" class="form-input" id="inputNote"
                 placeholder="例如：YouTube 账号">
        </div>
      </div>

      <div class="form-group autosave-section">
        <div class="autosave-header">
          <label class="toggle">
            <input type="checkbox" id="inputAutoSave">
            <span class="toggle-slider"></span>
          </label>
          <span class="autosave-label">运行后自动写入固定文件</span>
        </div>
        <div class="form-group hidden" id="filenameGroup">
          <label class="form-label" style="margin-top:10px">保存文件名</label>
          <div class="dir-input-row">
            <span class="dir-prefix" id="baseDirLabel">CookieKeeper /</span>
            <input type="text" class="form-input" id="inputFilename"
                   placeholder="youtube_com_cookies.txt">
          </div>
          <div class="form-tip" id="fullPathHint">
            完整路径：下载目录 / CookieKeeper / youtube_com_cookies.txt
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-ghost" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
