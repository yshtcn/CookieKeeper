<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Cookie Keeper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-icon">🍪</span>
      <h1>Cookie Keeper</h1>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="runAllBtn" title="立即运行全部">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="btn-icon" id="exportAllBtn" title="导出全部 Cookie">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Task list -->
  <div class="task-list" id="taskList"></div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🍪</div>
    <div class="empty-title">还没有配置网站</div>
    <div class="empty-subtitle">点击下方按钮，添加需要保鲜 Cookie 的网站</div>
  </div>

  <!-- Add button bar -->
  <div class="add-bar">
    <button class="btn-add" id="addTaskBtn">＋ 添加网站</button>
  </div>

  <!-- Add / Edit modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">添加网站</div>

      <div class="form-group">
        <label class="form-label">网站地址 <span class="req">*</span></label>
        <input type="url" class="form-input" id="inputUrl"
               placeholder="https://www.youtube.com">
        <div class="form-error" id="urlError"></div>
      </div>

      <div class="form-group">
        <label class="form-label">刷新间隔 <span class="req">*</span></label>
        <div class="interval-row">
          <input type="number" class="form-input" id="inputInterval"
                 min="1" max="99999" value="1">
          <select class="form-select" id="inputUnit">
            <option value="1">分钟</option>
            <option value="60" selected>小时</option>
            <option value="1440">天</option>
          </select>
        </div>
        <div class="form-tip">最短间隔 1 分钟（Chrome 限制）</div>
      </div>

      <div class="form-group">
        <label class="form-label">备注名称（可选）</label>
        <input type="text" class="form-input" id="inputNote"
               placeholder="例如：YouTube 账号">
      </div>

      <div class="form-actions">
        <button class="btn-cancel" id="cancelBtn">取消</button>
        <button class="btn-save" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
